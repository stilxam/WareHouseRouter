program: train.py
method: bayes
run_cap: 40
metric:
  name: metrics/success_rate
  goal: maximize

parameters:
  algo:
    value: ppo

  # Fixed training scale (RTX 4090 — ~82M env steps per run)
  num_envs:
    value: 256
  steps:
    value: 5000

  # Tuned
  lr:
    distribution: log_uniform_values
    min: 1.0e-4
    max: 3.0e-3
  gamma:
    values: [0.95, 0.99]
  entropy_coeff:
    distribution: log_uniform_values
    min: 0.005
    max: 0.1
  clip_eps:
    values: [0.1, 0.2, 0.3]
  gae_lambda:
    values: [0.9, 0.95, 0.98]
  k_epochs:
    values: [2, 4, 8]
  rollouts:
    values: [64, 128, 256]
