program: train.py
method: bayes
metric:
  name: metrics/success_rate
  goal: maximize

parameters:
  algo:
    values: [ppo, dqn]

  # Shared
  gamma:
    values: [0.95, 0.99]
  lr:
    distribution: log_uniform_values
    min: 1.0e-4
    max: 1.0e-2

  # PPO-specific
  clip_eps:
    values: [0.1, 0.2, 0.3]
  gae_lambda:
    values: [0.9, 0.95, 0.98]
  k_epochs:
    values: [2, 4, 8]
  rollouts:
    values: [30, 64, 128]
  entropy_coeff:
    values: [0.01, 0.05, 0.1]

  # DQN-specific
  target_update_freq:
    values: [200, 500, 1000]
  eps_decay_steps:
    values: [50_000, 100_000, 200_000]
  batch_size:
    values: [128, 256, 512]
