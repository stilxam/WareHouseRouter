program: train.py
method: bayes
run_cap: 30
metric:
  name: metrics/success_rate
  goal: maximize

parameters:
  algo:
    value: dqn

  # Fixed training scale (20M env steps, matched with PPO)
  total_steps:
    value: 20000000

  # Tuned
  buffer_size:
    values: [50000, 100000, 200000]
  lr:
    distribution: log_uniform_values
    min: 5.0e-5
    max: 5.0e-3
  gamma:
    values: [0.99, 0.995]
  batch_size:
    values: [128, 256, 512]
  target_update_freq:
    values: [200, 500, 1000, 2000]
  # Extended upper bound — sparse reward + fixed world needs sustained exploration
  eps_decay_steps:
    values: [100000, 250000, 500000, 1000000]
  world_seed:
    value: 42
